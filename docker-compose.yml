services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-isin}
    ports:
      - "${HOST_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    privileged: true
    volumes:
      - /etc/auto_nas:/etc/auto_nas:ro
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}

      # 容器網路內固定連同網段的 Postgres 服務（勿使用 .env 的 localhost）
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_NAME: ${DB_NAME:-isin}
      DB_SYNC: ${DB_SYNC:-false}
      DB_MIGRATIONS_RUN: ${DB_MIGRATIONS_RUN:-true}

      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      STAFF_PAGE_LOCK_PASSWORD: ${STAFF_PAGE_LOCK_PASSWORD:-}
      DWG_PATH: ${DWG_PATH:-}
      CNC_PATH: ${CNC_PATH:-}
      NESTING_PATH: ${NESTING_PATH:-}
      LIBREOFFICE_PATH: ${LIBREOFFICE_PATH:-}
      # 啟動時由 NasService.mountAll() 掛載 /etc/auto_nas 內所有 SMB 分享
      NAS_AUTO_MOUNT: ${NAS_AUTO_MOUNT:-true}
    ports:
      - "${HOST_BACKEND_PORT:-3000}:${PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "${HOST_FRONTEND_PORT:-3001}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
